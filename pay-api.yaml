---
- name: Set up pay-api web nodes
  hosts: webservers
  become: yes
  roles:
    - pay-api

- name: Set up pay-api database node
  hosts: dbservers
  become: yes
  tasks:
    - name: Install mariadb
      ansible.builtin.apt:
        name: mariadb-server
        state: present
        update_cache: yes

    - name: Start mariadb and enable on boot
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: yes
